name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 'Kernel Link'
        required: true
        default: 'https://github.com/dpxdoss/android_kernel_realme_RMX2020.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '16.0-KSU'
      clang_url:
        description: 'Clang Link'
        required: true
        default: 'https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r50/clang-r510928.tar.gz'
      ak3_source:
        description: 'AnyKernel3 Link'
        required: true
        default: 'https://github.com/dpxdoss/AnyKernel3.git'
      ak3_branch:
        description: 'AnyKernel3 Branch'
        required: true
        default: 'RMX2020'
      ksu_source:
        description: 'KernelSU Link (Clear this box to skip KSU)'
        required: false
        default: 'https://raw.githubusercontent.com/backslashxx/KernelSU/refs/heads/master/kernel/setup.sh'
      ksu_branch:
        description: 'KernelSU Branch'
        required: false
        default: 'master'

env:
  BUILD_HOST: ReviveMeJett
  BUILD_USER: dantepaulxd
  USE_LLVM: 1
  NO_ERROR_ON_MISMATCH: y
  POST_AS_DRAFT: true
  INCLUDE_DATE: true
  FETCH_KSU_APK: true

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git flex bison build-essential zip curl bc jq git-lfs python3
          git lfs install

      - name: Cloning Kernel
        run: |
          git clone --depth=1 -b ${{ inputs.kernel_branch }} ${{ inputs.kernel_source }} kernel-source
          cd kernel-source
          echo "LATEST_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "SHORT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Cloning Clang
        run: |
          mkdir -p clang
          if [[ "${{ inputs.clang_url }}" == *.tar.gz ]]; then
            curl -LO "${{ inputs.clang_url }}"
            tar -xf *.tar.gz -C clang
          else
            git clone --depth=1 ${{ inputs.clang_url }} clang
          fi

      - name: Setup KernelSU
        if: inputs.ksu_source != '' && contains(inputs.ksu_source, 'http')
        run: |
          cd kernel-source
          curl -LSs "${{ inputs.ksu_source }}" | bash -s ${{ inputs.ksu_branch }}
          
          if [ -d "drivers/kernelsu" ]; then KSU_TYPE="KernelSU"; KSU_REPO="backslashxx/KernelSU"; 
          elif [ -d "drivers/ksu" ]; then KSU_TYPE="KernelSU-Next"; KSU_REPO="tiann/KernelSU"; 
          else KSU_TYPE="KSU"; KSU_REPO="backslashxx/KernelSU"; fi
          
          KSU_DATA=$(curl -s https://api.github.com/repos/$KSU_REPO/releases/latest)
          KSU_VER=$(echo $KSU_DATA | jq -r .tag_name)
          echo "KSU_INFO=${KSU_TYPE}-${KSU_VER}" >> $GITHUB_ENV
          
          if [ "${{ env.FETCH_KSU_APK }}" = "true" ]; then
            APK_URL=$(echo $KSU_DATA | jq -r '.assets[] | select(.name | contains("apk")) | .browser_download_url' | head -n 1)
            curl -L "$APK_URL" -o "../${KSU_TYPE}_Manager_${KSU_VER}.apk"
          fi

      - name: Skip KernelSU
        if: inputs.ksu_source == '' || !contains(inputs.ksu_source, 'http')
        run: |
          echo "KSU_INFO=None" >> $GITHUB_ENV
          # Force disable KSU in defconfig if it's already in the source
          cd kernel-source
          DEFCONFIG=$(ls arch/arm64/configs/ | grep "_defconfig" | head -n 1)
          sed -i 's/CONFIG_KSU=y/CONFIG_KSU=n/g' arch/arm64/configs/$DEFCONFIG
          sed -i 's/CONFIG_KSU_NEXT=y/CONFIG_KSU_NEXT=n/g' arch/arm64/configs/$DEFCONFIG

      - name: Building Kernel
        run: |
          cd kernel-source
          DEFCONFIG=$(ls arch/arm64/configs/ | grep "_defconfig" | head -n 1)
          DEVICE=$(echo $DEFCONFIG | sed 's/_defconfig//')
          echo "DEVICE=$DEVICE" >> $GITHUB_ENV
          
          export PATH="${{ github.workspace }}/clang/bin:${PATH}"
          make O=out ARCH=arm64 $DEFCONFIG
          
          # Force build flags based on KSU_INFO
          KSU_FLAG=""
          if [ "${{ env.KSU_INFO }}" = "None" ]; then
             KSU_FLAG="CONFIG_KSU=n CONFIG_KSU_NEXT=n"
          fi

          make -j$(nproc --all) O=out ARCH=arm64 CC="clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- \
            LLVM=${{ env.USE_LLVM }} CONFIG_NO_ERROR_ON_MISMATCH=${{ env.NO_ERROR_ON_MISMATCH }} \
            $KSU_FLAG

      - name: Prepare Assets
        run: |
          IMAGE=$(find kernel-source/out/arch/arm64/boot -name "Image.gz*" | head -n 1)
          OUT_DIR="${{ github.workspace }}/out_assets"
          mkdir -p $OUT_DIR
          git clone --depth=1 -b ${{ inputs.ak3_branch }} ${{ inputs.ak3_source }} AnyKernel
          
          KSU_PART=""
          [ "${{ env.KSU_INFO }}" != "None" ] && KSU_PART="_${{ env.KSU_INFO }}"
          [ "${{ env.INCLUDE_DATE }}" = "true" ] && DATE_STR="_$(date +%d%m%y-%H%M)" || DATE_STR=""
          
          BASE_NAME="${{ env.BUILD_HOST }}${KSU_PART}_${{ env.DEVICE }}${DATE_STR}"
          echo "FINAL_NAME=$BASE_NAME" >> $GITHUB_ENV

          cp $IMAGE AnyKernel/
          cd AnyKernel && zip -r9 ../$BASE_NAME.zip ./* && cd ..
          mv $BASE_NAME.zip $OUT_DIR/
          [ -f *.apk ] && [ "${{ env.KSU_INFO }}" != "None" ] && mv *.apk $OUT_DIR/ || rm -f *.apk

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_FLAG=""
          [ "${{ env.POST_AS_DRAFT }}" = "true" ] && DRAFT_FLAG="--draft"
          gh release create "${{ env.FINAL_NAME }}" $DRAFT_FLAG \
            --title "${{ env.FINAL_NAME }}" \
            --notes "Build: ${{ env.BUILD_HOST }} | KSU: ${{ env.KSU_INFO }}" \
            ${{ github.workspace }}/out_assets/*
